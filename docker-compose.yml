services:
  back:
    build: 
      context: ./back
      target: dev
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_MODEL=qwen3.5:9b
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=nvidia/nemotron-3-super-120b-a12b:free
    volumes:
      - ./back:/app

  front:
    build: 
      context: ./front
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - back