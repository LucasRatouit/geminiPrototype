services:
  back:
    build: ./back
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_MODEL=qwen3.5:9b
    volumes:
      - ./back:/app
    command: npm run dev

  front:
    build: 
      context: ./front
      target: dev
    ports:
      - "4000:4000"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    depends_on:
      - back