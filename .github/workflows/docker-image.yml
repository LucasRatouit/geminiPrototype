name: Build & Push Docker Images (Front + Back)

on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug - vérifier le username
        run: echo "Username = ${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front       # Le dossier "front" passé à la fin de ta commande
          platforms: linux/amd64,linux/arm64
          tags: rlucasfr/gemini-prototype-front:latest
          push: true
          cache-from: type=gha,scope=front   # Cache séparé pour le front
          cache-to: type=gha,mode=max,scope=front

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          platforms: linux/amd64,linux/arm64
          tags: rlucasfr/gemini-prototype-back:latest
          push: true
          cache-from: type=gha,scope=back    # Cache séparé pour le back
          cache-to: type=gha,mode=max,scope=back
